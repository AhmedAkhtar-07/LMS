<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instructor Dashboard — LMS</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/instructor-dashboard.css">
</head>
<body>
<div class="page-wrapper">

    <nav class="navbar">
        <span class="nav-brand">LMS</span>
        <div class="nav-right">
            <span class="nav-user">👤 <span id="userName"></span></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="dashboard">

        <!-- ── Summary stat cards ── -->
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-value" id="statCourses">—</div>
                <div class="stat-label">My Courses</div>
            </div>
            <div class="stat-card highlight">
                <div class="stat-value" id="statStudents">—</div>
                <div class="stat-label">Total Students</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statQuizzes">—</div>
                <div class="stat-label">Total Quizzes</div>
            </div>
        </div>

        <!-- ── Course list ── -->
        <div class="dash-section">
            <div class="section-header">
                <h3 class="section-title" style="margin:0;">My Courses</h3>
                <a href="/pages/create-course.html" class="btn-primary">+ Create Course</a>
            </div>
            <div id="courseList">
                <p class="loading-text">Loading courses...</p>
            </div>
        </div>

        <!-- ── Analytics table ── -->
        <div class="dash-section" id="analyticsSection" style="display:none;">
            <h3 class="section-title">Course Analytics</h3>
            <div class="analytics-table-wrap">
                <table class="analytics-table">
                    <thead>
                        <tr>
                            <th>Course</th>
                            <th>Students</th>
                            <th>Quizzes</th>
                            <th>Avg Score</th>
                            <th>Pass Rate</th>
                        </tr>
                    </thead>
                    <tbody id="analyticsBody"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/instructor-dashboard.js"></script>
</body>
</html>
