<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register — LMS</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-brand">
        <span class="auth-brand-name">LMS</span>
        <span class="auth-brand-tag">Learning Management System</span>
    </div>
    <h2>Create Account</h2>
    <form id="registerForm">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
        <label for="role">Role</label>
        <select id="role" required>
            <option value="">-- Select Role --</option>
            <option value="student">Student</option>
            <option value="instructor">Instructor</option>
        </select>
        <button type="submit">Register</button>
    </form>
    <p class="msg" id="msg"></p>
    <div class="auth-link">
        Already have an account? <a href="/pages/login.html">Login here</a>
    </div>
</div>
<script src="/js/register.js"></script>
</body>
</html>
