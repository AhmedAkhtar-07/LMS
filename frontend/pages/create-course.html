<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Course — LMS</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/create-course.css">
</head>
<body>

<div class="page-wrapper">

    <!-- Top navigation bar -->
    <nav class="navbar">
        <span class="nav-brand">LMS</span>
        <div class="nav-links">
            <a href="/pages/instructor-dashboard.html">← Back to Dashboard</a>
        </div>
    </nav>

    <div class="form-card">
        <h2>Create New Course</h2>
        <p class="form-subtitle">Fill in the details below to create a course.</p>

        <form id="createCourseForm">

            <div class="form-group">
                <label for="title">Course Title <span class="required">*</span></label>
                <input type="text" id="title" placeholder="e.g. Database Systems" maxlength="200" required>
            </div>

            <div class="form-group">
                <label for="description">Description <span class="optional">(optional)</span></label>
                <textarea id="description" placeholder="Brief description of what this course covers..." rows="4" maxlength="1000"></textarea>
            </div>

            <button type="submit" class="btn-primary">Create Course</button>
        </form>

        <!-- Success or error message shown here -->
        <p class="msg" id="msg"></p>
    </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/create-course.js"></script>

</body>
</html>
